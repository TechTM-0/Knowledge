<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="app" class="flex h-screen p-4 gap-4">

  <!-- ===== サイドバー ===== -->
  <aside class="w-72 flex flex-col gap-3 shrink-0">

    <!-- ヘッダー -->
    <header class="glass rounded-2xl px-5 py-4 flex items-center justify-between">
      <div>
        <div class="text-xs text-indigo-400 font-medium tracking-widest mb-0.5">KNOWLEDGE</div>
        <div class="text-white text-lg font-bold leading-none">マイノート</div>
      </div>
      <div class="flex gap-2">
        <button class="btn-primary px-3 py-2 text-sm font-medium" id="templateBtn">📋</button>
        <button class="btn-primary px-3 py-2 text-sm font-medium" id="newNoteBtn">＋ 新規</button>
      </div>
    </header>

    <!-- 検索 -->
    <div class="relative">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/30 text-sm select-none">🔍</span>
      <input
        id="searchInput"
        type="text"
        placeholder="ノートを検索..."
        class="glass-input w-full pl-8 pr-4 py-2.5 text-sm"
      >
    </div>

    <!-- カテゴリフィルター -->
    <nav class="glass rounded-xl px-4 py-2.5 flex gap-2 flex-wrap">
      <button class="tag tag--active" data-category="all">すべて</button>
      <button class="tag" data-category="idea">アイデア</button>
      <button class="tag" data-category="memo">メモ</button>
      <button class="tag" data-category="research">調査</button>
    </nav>

    <!-- ノート一覧 -->
    <div id="noteList" class="flex-1 overflow-y-auto flex flex-col gap-2 pr-0.5"></div>

    <!-- フッター -->
    <footer class="glass rounded-xl px-4 py-2.5 text-xs text-white/30 text-center">
      <span id="noteCount">0</span> 件のノート
    </footer>

  </aside>

  <!-- ===== メインコンテンツ ===== -->
  <main class="flex-1 glass rounded-2xl flex flex-col overflow-hidden min-w-0">

    <!-- 未選択状態 -->
    <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-white/20">
      <div class="text-6xl mb-4">📝</div>
      <div class="text-lg">ノートを選択してください</div>
      <div class="text-sm mt-1">または新規ノートを作成</div>
    </div>

    <!-- ノート表示／編集エリア -->
    <div id="noteView" class="hidden flex-1 flex flex-col overflow-hidden">

      <!-- ノートヘッダー -->
      <div class="px-6 pt-5 pb-3 border-b border-white/08 flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <div id="noteTitle" class="text-xl font-bold text-white leading-snug"></div>
          <input id="noteTitleInput" type="text" placeholder="タイトル"
            class="hidden text-xl font-bold text-white leading-snug bg-transparent border-b border-white/20 outline-none w-full pb-0.5 focus:border-white/50 transition-colors">
          <div class="flex items-center gap-3 mt-1.5">
            <span id="noteDate" class="text-xs text-white/40"></span>
            <span id="noteCategory" class="tag"></span>
            <select id="noteCategorySelect" class="tag hidden"></select>
          </div>
        </div>
        <div class="flex gap-2 shrink-0">
          <button id="generateBtn" class="btn-primary px-3 py-1.5 text-xs hidden">✨ AI</button>
          <button id="editBtn" class="btn-primary px-3 py-1.5 text-xs">✏️ 編集</button>
          <button id="deleteBtn" class="btn-danger px-3 py-1.5 text-xs">🗑️</button>
        </div>
      </div>

      <!-- タグ一覧 -->
      <div id="noteTags" class="px-6 py-2.5 flex gap-1.5 flex-wrap items-center border-b border-white/08"></div>

      <!-- スライドタブ（slide ノートの view モードのみ表示） -->
      <div id="slideTabs" class="hidden px-6 pt-3 pb-1 gap-2">
        <button id="slideTabSlide" class="tag tag--active" data-tab="slide">▶ スライド</button>
        <button id="slideTabCode" class="tag" data-tab="code">{ } コード</button>
      </div>

      <!-- 表示モード（article: Markdown / slide コードタブ: <pre>） -->
      <div id="noteContent" class="flex-1 overflow-y-auto px-6 py-4 markdown-body"></div>

      <!-- スライド iframe（slide ノートのスライドタブで表示） -->
      <div id="slideContainer" class="hidden flex-1 relative min-h-0">
        <iframe id="slideFrame" class="absolute inset-0 w-full h-full border-0" sandbox="allow-scripts"></iframe>
      </div>

      <!-- 編集モード -->
      <textarea
        id="noteEditor"
        class="hidden flex-1 glass-input resize-none px-6 py-4 text-sm leading-relaxed rounded-none border-0 border-t border-white/08 font-mono"
        placeholder="Markdown で書けます..."
      ></textarea>

    </div>

  </main>

</div>

<!-- ===== テンプレート管理モーダル ===== -->
<div id="templateModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div id="templateOverlay" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

  <div class="glass rounded-2xl w-full max-w-3xl relative z-10 flex overflow-hidden" style="height:72vh">

    <!-- 左パネル: テンプレート一覧 -->
    <div class="w-52 shrink-0 flex flex-col border-r border-white/10">
      <div class="px-4 py-3 border-b border-white/10 flex items-center justify-between">
        <span class="text-white font-bold text-sm">📋 テンプレート</span>
        <button id="templateCloseBtn" class="text-white/40 hover:text-white text-xl leading-none">×</button>
      </div>
      <div id="templateList" class="flex-1 overflow-y-auto py-2"></div>
      <div class="p-3 border-t border-white/10">
        <button id="templateNewBtn" class="btn-primary w-full py-2 text-xs font-medium">＋ 新規作成</button>
      </div>
    </div>

    <!-- 右パネル: 編集フォーム -->
    <div class="flex-1 flex flex-col min-w-0">
      <div id="templateFormEmpty" class="flex-1 flex items-center justify-center text-white/30 text-sm">
        テンプレートを選択または新規作成
      </div>

      <div id="templateForm" class="hidden flex-1 flex flex-col overflow-hidden">
        <div class="flex-1 overflow-y-auto p-5 flex flex-col gap-4">

          <!-- 名前 -->
          <div class="flex flex-col gap-1.5">
            <label class="text-xs text-white/60">テンプレート名</label>
            <input id="tmplName" type="text" class="glass-input px-3 py-2 text-sm" placeholder="例: 技術記事">
          </div>

          <!-- フォーマット種別 -->
          <div class="flex flex-col gap-1.5">
            <label class="text-xs text-white/60">フォーマット</label>
            <select id="tmplFormatType" class="glass-input px-3 py-2 text-sm">
              <option value="article">article</option>
              <option value="slide">slide</option>
            </select>
          </div>

          <!-- テンプレート本文 -->
          <div class="flex flex-col gap-1.5 flex-1">
            <label class="text-xs text-white/60">テンプレート本文（Markdown 見出し構造）</label>
            <textarea id="tmplContent" class="glass-input px-3 py-2 text-sm resize-none flex-1 font-mono" style="min-height:120px" placeholder="# タイトル&#10;## はじめに&#10;## 本文&#10;## まとめ"></textarea>
          </div>

          <!-- 生成パラメータ -->
          <div class="flex flex-col gap-2">
            <div class="flex items-center justify-between">
              <label class="text-xs text-white/60">生成パラメータ（Gemini への指示）</label>
              <button id="tmplAddParamBtn" class="text-xs text-blue-300 hover:text-blue-200">＋ 追加</button>
            </div>
            <div id="tmplParamRows" class="flex flex-col gap-1.5"></div>
          </div>

        </div>

        <!-- フォームフッター -->
        <div class="p-4 border-t border-white/10 flex gap-2 justify-between">
          <button id="tmplDeleteBtn" class="btn-danger px-4 py-2 text-xs">削除</button>
          <div class="flex gap-2">
            <div id="tmplError" class="hidden text-red-400 text-xs self-center"></div>
            <button id="tmplSaveBtn" class="btn-primary px-5 py-2 text-xs font-medium">保存</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ===== 生成モーダル ===== -->
<div id="generateModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- 背景オーバーレイ -->
  <div id="generateOverlay" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

  <div class="glass rounded-2xl p-6 w-full max-w-lg relative z-10 flex flex-col gap-4">
    <div class="flex items-center justify-between">
      <div class="text-white font-bold text-lg">✨ AI でノートを生成</div>
      <button id="generateCloseBtn" class="text-white/40 hover:text-white text-xl leading-none">×</button>
    </div>

    <!-- テンプレート選択 -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs text-white/60">テンプレート</label>
      <select id="templateSelect" class="glass-input px-3 py-2 text-sm">
        <option value="">テンプレートを選択...</option>
      </select>
    </div>

    <!-- モデル選択 -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs text-white/60">モデル</label>
      <select id="modelSelect" class="glass-input px-3 py-2 text-sm">
        <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite（1,000回/日）</option>
        <option value="gemini-2.5-flash">gemini-2.5-flash（20回/日・高品質）</option>
        <option value="gemini-1.5-flash">gemini-1.5-flash（250回/日）</option>
      </select>
    </div>

    <!-- プロンプト入力 -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs text-white/60">トピック・内容</label>
      <textarea
        id="generatePrompt"
        class="glass-input px-3 py-2 text-sm resize-none"
        rows="4"
        placeholder="例: Python の非同期処理について調査した内容..."
      ></textarea>
    </div>

    <!-- 生成ボタン -->
    <button id="generateSubmitBtn" class="btn-primary px-4 py-2.5 text-sm font-medium w-full">
      生成する
    </button>
    <div id="generateError" class="hidden text-red-400 text-xs text-center"></div>
  </div>
</div>

<script type="module" src="/static/app.js"></script>
</body>
</html>
