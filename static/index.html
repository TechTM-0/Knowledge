<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="app" class="flex h-screen p-4 gap-4">

  <!-- ===== サイドバー ===== -->
  <aside class="w-72 flex flex-col gap-3 shrink-0">

    <!-- ヘッダー -->
    <header class="glass rounded-2xl px-5 py-4 flex items-center justify-between">
      <div>
        <div class="text-xs text-indigo-400 font-medium tracking-widest mb-0.5">KNOWLEDGE</div>
        <div class="text-white text-lg font-bold leading-none">マイノート</div>
      </div>
      <button class="btn-primary px-3 py-2 text-sm font-medium" id="newNoteBtn">
        ＋ 新規
      </button>
    </header>

    <!-- 検索 -->
    <div class="relative">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-white/30 text-sm select-none">🔍</span>
      <input
        id="searchInput"
        type="text"
        placeholder="ノートを検索..."
        class="glass-input w-full pl-8 pr-4 py-2.5 text-sm"
      >
    </div>

    <!-- カテゴリフィルター -->
    <nav class="glass rounded-xl px-4 py-2.5 flex gap-2 flex-wrap">
      <button class="tag tag--active" data-category="all">すべて</button>
      <button class="tag" data-category="idea">アイデア</button>
      <button class="tag" data-category="memo">メモ</button>
      <button class="tag" data-category="research">調査</button>
    </nav>

    <!-- ノート一覧 -->
    <div id="noteList" class="flex-1 overflow-y-auto flex flex-col gap-2 pr-0.5"></div>

    <!-- フッター -->
    <footer class="glass rounded-xl px-4 py-2.5 text-xs text-white/30 text-center">
      <span id="noteCount">0</span> 件のノート
    </footer>

  </aside>

  <!-- ===== メインコンテンツ ===== -->
  <main class="flex-1 glass rounded-2xl flex flex-col overflow-hidden min-w-0">

    <!-- 未選択状態 -->
    <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-white/20">
      <div class="text-6xl mb-4">📝</div>
      <div class="text-lg">ノートを選択してください</div>
      <div class="text-sm mt-1">または新規ノートを作成</div>
    </div>

    <!-- ノート表示／編集エリア -->
    <div id="noteView" class="hidden flex-1 flex flex-col overflow-hidden">

      <!-- ノートヘッダー -->
      <div class="px-6 pt-5 pb-3 border-b border-white/08 flex items-start justify-between gap-4">
        <div class="flex-1 min-w-0">
          <div id="noteTitle" class="text-xl font-bold text-white leading-snug"></div>
          <div class="flex items-center gap-3 mt-1.5">
            <span id="noteDate" class="text-xs text-white/40"></span>
            <span id="noteCategory" class="tag"></span>
          </div>
        </div>
        <div class="flex gap-2 shrink-0">
          <button id="editBtn" class="btn-primary px-3 py-1.5 text-xs">✏️ 編集</button>
          <button id="deleteBtn" class="btn-danger px-3 py-1.5 text-xs">🗑️</button>
        </div>
      </div>

      <!-- タグ一覧 -->
      <div id="noteTags" class="px-6 py-2.5 flex gap-1.5 flex-wrap border-b border-white/08"></div>

      <!-- 表示モード -->
      <div id="noteContent" class="flex-1 overflow-y-auto px-6 py-4 markdown-body"></div>

      <!-- 編集モード -->
      <textarea
        id="noteEditor"
        class="hidden flex-1 glass-input resize-none px-6 py-4 text-sm leading-relaxed rounded-none border-0 border-t border-white/08 font-mono"
        placeholder="Markdown で書けます..."
      ></textarea>

    </div>

  </main>

</div>

<script src="/static/app.js"></script>
</body>
</html>
